tasks:
  - filename: "weight.xlsx"
    curl_command: >
      curl -L -f --show-error "https://oss-ch.csindex.com.cn/static/html/csindex/public/uploads/file/autofile/closeweight/000902closeweight.xls"
      -o "{output}"

  - filename: "zzindu.xlsx"
    curl_command: >
      curl -L -X POST
      "https://www.csindex.com.cn/csindex-home/exportExcel/security-industry-search-excel/CH"
      -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36"
      -H "Accept: application/json, text/plain, */*"
      -H "Accept-Language: zh-CN,zh;q=0.9,en;q=0.8"
      -H "Content-Type: application/json;charset=UTF-8"
      -H "Origin: https://www.csindex.com.cn"
      -H "Referer: https://www.csindex.com.cn/"
      -H "sec-ch-ua: \"Google Chrome\";v=\"149\", \"Chromium\";v=\"149\", \"Not)A;Brand\";v=\"24\""
      -H "sec-ch-ua-mobile: ?0"
      -H "sec-ch-ua-platform: \"Linux\""
      -b "Hm_lvt_f0fbc9a7e7e7f29a55a0c13718e9e542=1783231090,1783258680; HMACCOUNT=91AD792EC75B54FC; Hm_lpvt_f0fbc9a7e7e7f29a55a0c13718e9e542=1783261302"
      --data-raw '{"searchInput":"","pageNum":1,"pageSize":10,"sortField":null,"sortOrder":null}'
      -o "{output}"

output_dir: "../src/assets"
